<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primario: #2c3e50;
            --acento: #e67e22;
            --fondo: #f9f7f2;
            --blanco: #ffffff;
            --texto: #444444;
            --verde: #27ae60;
        }

        @keyframes vibrate {
            0% { transform: translateX(0); }
            25% { transform: translateX(-2px) rotate(-1deg); }
            50% { transform: translateX(2px) rotate(1deg); }
            75% { transform: translateX(-2px) rotate(-1deg); }
            100% { transform: translateX(0); }
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            background-color: var(--blanco);
            max-width: 550px;
            width: 100%;
            padding: 30px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        @media (min-width: 600px) {
            body { padding: 40px 20px; align-items: center; }
            .container { border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); padding: 40px; }
        }

        .free-badge {
            background-color: var(--verde);
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
            animation: vibrate 0.5s linear infinite;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo {
            max-width: 150px;
            height: auto;
            margin: 0 auto 20px auto;
            display: block;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primario);
            font-size: 1.6rem;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        p.subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.85rem;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--primario);
        }

        input[type="text"], input[type="email"], input[type="tel"] {
            width: 100%;
            padding: 16px; 
            border: 1px solid #ddd;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 16px;
            transition: all 0.3s;
            -webkit-appearance: none;
        }

        input:focus {
            outline: none;
            border-color: var(--acento);
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
        }

        .radio-section {
            background: #fdfdfd;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #eee;
            margin-bottom: 25px;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #eee;
        }

        .radio-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        @media (min-width: 400px) {
            .radio-group { flex-direction: row; justify-content: space-between; align-items: center; }
        }

        .options { display: flex; gap: 10px; flex: 1; max-width: 200px; }

        .options label {
            flex: 1;
            font-weight: 400;
            cursor: pointer;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            position: relative;
        }

        .options input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .options label:has(input:checked) {
            background-color: var(--acento);
            border-color: var(--acento);
            color: white;
            font-weight: 600;
        }

        .grid-mobile { display: flex; flex-direction: column; gap: 0; }
        @media (min-width: 480px) {
            .grid-mobile { flex-direction: row; gap: 15px; }
            .grid-mobile .form-group { flex: 1; }
        }

        button {
            width: 100%;
            background-color: var(--acento);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(230, 126, 34, 0.2);
        }

        button:active { transform: scale(0.98); }

        .success-msg {
            display: none;
            color: var(--verde);
            font-weight: 600;
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="free-badge">El registro es sin costo</div>
    <img src="https://lh3.googleusercontent.com/d/1SGywAsWA8FAiwUhOd03aEhsBzGrXgotX" alt="Logo" class="logo">
    <h1>Únete a la Comunidad</h1>
    <p class="subtitle">Registra tu local gastronómico de forma profesional</p>

    <form id="gastronomiaForm">
        <div class="form-group">
            <label>Nombre del Local *</label>
            <input type="text" name="nombre_local" placeholder="Ej: La Posta Restó" required>
        </div>

        <div class="radio-section">
            <div class="radio-group">
                <label>¿Comer en local? *</label>
                <div class="options">
                    <label><input type="radio" name="comer_local" value="si" required> Sí</label>
                    <label><input type="radio" name="comer_local" value="no"> No</label>
                </div>
            </div>

            <div class="radio-group">
                <label>¿Comida para llevar? *</label>
                <div class="options">
                    <label><input type="radio" name="take_away" value="si" required> Sí</label>
                    <label><input type="radio" name="take_away" value="no"> No</label>
                </div>
            </div>

            <div class="radio-group">
                <label>¿Delivery propio? *</label>
                <div class="options">
                    <label><input type="radio" name="delivery" value="si" required> Sí</label>
                    <label><input type="radio" name="delivery" value="no"> No</label>
                </div>
            </div>
        </div>

        <div class="grid-mobile">
            <div class="form-group">
                <label>Provincia *</label>
                <input type="text" name="provincia" placeholder="Ej: Bs As" required>
            </div>
            <div class="form-group">
                <label>Barrio *</label>
                <input type="text" name="barrio" placeholder="Ej: Palermo" required>
            </div>
        </div>

        <div class="form-group">
            <label>Nombre del Contacto *</label>
            <input type="text" name="nombre_contacto" placeholder="Nombre del dueño" required>
        </div>

        <div class="form-group">
            <label>Cuenta de Gmail *</label>
            <input type="email" name="mail" placeholder="contacto@mail.com" required>
        </div>

        <div class="grid-mobile">
            <div class="form-group">
                <label>Celular Personal *</label>
                <input type="tel" name="celular_personal" placeholder="Ej: 1122334455" required>
            </div>
            <div class="form-group">
                <label>Celular Negocio *</label>
                <input type="tel" name="celular_negocio" placeholder="Para pedidos" required>
            </div>
        </div>

        <button type="submit" id="submitBtn">Registrar y Enviar WhatsApp</button>
        <div id="responseMsg" class="success-msg">¡Datos registrados! Redirigiendo a WhatsApp...</div>
    </form>
</div>
