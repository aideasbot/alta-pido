<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Gastronómico | Tu Plataforma</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #2c3e50;
            --acento: #e67e22;
            --fondo: #f9f7f2;
            --blanco: #ffffff;
            --texto: #444444;
        }

        @keyframes vibrate {
            0% { transform: translateX(0); }
            25% { transform: translateX(-2px) rotate(-1deg); }
            50% { transform: translateX(2px) rotate(1deg); }
            75% { transform: translateX(-2px) rotate(-1deg); }
            100% { transform: translateX(0); }
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--blanco);
            max-width: 550px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            text-align: center;
            position: relative;
        }

        /* Badge de Registro Sin Costo */
        .free-badge {
            background-color: #27ae60;
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
            animation: vibrate 0.5s linear infinite;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo {
            max-width: 180px; /* Ajusta este ancho según prefieras */
            height: auto;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primario);
            font-size: 1.8rem;
            margin: 0 0 10px 0;
        }

        p.subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--primario);
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--acento);
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
        }

        .radio-section {
            background: #fdfdfd;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eee;
            margin-bottom: 25px;
        }

        .radio-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .radio-group:last-child { margin-bottom: 0; }

        .options {
            display: flex;
            gap: 15px;
        }

        .options label {
            font-weight: 400;
            cursor: pointer;
            margin-bottom: 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button {
            width: 100%;
            background-color: var(--acento);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #d35400;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(230, 126, 34, 0.3);
        }

        .success-msg {
            display: none;
            color: #27ae60;
            font-weight: 600;
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="free-badge">El registro es sin costo</div>
    <img src="https://lh3.googleusercontent.com/d/1SGywAsWA8FAiwUhOd03aEhsBzGrXgotX" alt="Logo" class="logo">
    <h1>Únete a la Comunidad</h1>
    <p class="subtitle">Registra tu local gastronómico de forma profesional</p>

    <form id="gastronomiaForm">
        <div class="form-group">
            <label>Nombre del Local *</label>
            <input type="text" name="nombre_local" placeholder="Ej: La Posta Restó" required>
        </div>

        <div class="radio-section">
            <div class="radio-group">
                <label>¿Comer en local? *</label>
                <div class="options">
                    <label><input type="radio" name="comer_local" value="si" required> Sí</label>
                    <label><input type="radio" name="comer_local" value="no"> No</label>
                </div>
            </div>

            <div class="radio-group">
                <label>¿Comida para llevar? *</label>
                <div class="options">
                    <label><input type="radio" name="take_away" value="si" required> Sí</label>
                    <label><input type="radio" name="take_away" value="no"> No</label>
                </div>
            </div>

            <div class="radio-group">
                <label>¿Delivery propio? *</label>
                <div class="options">
                    <label><input type="radio" name="delivery" value="si" required> Sí</label>
                    <label><input type="radio" name="delivery" value="no"> No</label>
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>Provincia *</label>
                <input type="text" name="provincia" placeholder="Ej: Bs As" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Barrio *</label>
                <input type="text" name="barrio" placeholder="Ej: Palermo" required>
            </div>
        </div>

        <div class="form-group">
            <label>Nombre del Contacto *</label>
            <input type="text" name="nombre_contacto" placeholder="Nombre del dueño" required>
        </div>

        <div class="form-group">
            <label>Cuenta de Gmail*</label>
            <input type="email" name="mail" placeholder="contacto@mail.com" required>
        </div>

        <div class="form-group">
            <label>Celular de contacto *</label>
            <input type="tel" name="celular" placeholder="Ej: 1122334455" required>
        </div>

        <button type="submit" id="submitBtn">Registrar y Enviar WhatsApp</button>
        <div id="responseMsg" class="success-msg">¡Datos registrados! Redirigiendo a WhatsApp...</div>
    </form>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxjYbAgL0dDhVVXmXQW8yJKTpyxsdxAirqXa2YJ5AaOgc-HVrN5XTU8cTvrwm4gddnV/exec';

    const form = document.getElementById('gastronomiaForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('responseMsg');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'Guardando datos...';

        const formData = new FormData(form);

        fetch(SCRIPT_URL, { method: 'POST', body: formData })
        .then(response => {
            btn.style.display = 'none';
            msg.style.display = 'block';

            const tel = "5491165614612";
            const texto = `*Nuevo Registro Gastronómico*%0A%0A` +
                          `*Local:* ${formData.get('nombre_local')}%0A` +
                          `*Comer en local:* ${formData.get('comer_local')}%0A` +
                          `*Take Away:* ${formData.get('take_away')}%0A` +
                          `*Delivery:* ${formData.get('delivery')}%0A` +
                          `*Ubicación:* ${formData.get('barrio')}, ${formData.get('provincia')}%0A` +
                          `*Contacto:* ${formData.get('nombre_contacto')}%0A` +
                          `*Email:* ${formData.get('mail')}%0A` +
                          `*Celular:* ${formData.get('celular')}`;

            setTimeout(() => {
                window.location.href = `https://wa.me/${tel}?text=${texto}`;
            }, 1500);
        })
        .catch(error => {
            alert('Error al guardar. Revisa tu conexión.');
            btn.disabled = false;
            btn.innerText = 'Registrar y Enviar WhatsApp';
        });
    });
</script>

</body>
</html>
