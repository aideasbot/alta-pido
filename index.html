<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro Gastronómico | Tu Plataforma</title>

    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primario: #1e2a38;
            --acento: #25D366;
            --acento-hover: #1ebe5d;
            --acento-dark: #128C7E;
            --fondo: #f9f7f2;
            --blanco: #ffffff;
            --texto: #4a5568;
            --texto-suave: #718096;
            --verde: #25D366;
            --borde: #e2e8f0;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--fondo);
            background-image: 
                radial-gradient(at 20% 0%, rgba(37, 211, 102, 0.04) 0px, transparent 50%),
                radial-gradient(at 80% 100%, rgba(37, 211, 102, 0.04) 0px, transparent 50%);
            color: var(--texto);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            background-color: var(--blanco);
            max-width: 560px;
            width: 100%;
            padding: 32px 22px;
            box-sizing: border-box;
            text-align: center;
        }

        @media (min-width: 600px) {
            body { padding: 50px 20px; align-items: center; }
            .container { 
                border-radius: 24px; 
                box-shadow: 0 20px 50px rgba(30, 42, 56, 0.08), 0 4px 12px rgba(30, 42, 56, 0.04); 
                padding: 48px 44px; 
            }
        }

        .logo {
            max-width: 150px;
            height: auto;
            margin: 0 auto 24px auto;
            display: block;
        }

        h1 {
            font-family: 'Fraunces', serif;
            font-weight: 800;
            color: var(--primario);
            font-size: 1.85rem;
            margin: 0 0 10px 0;
            line-height: 1.15;
            letter-spacing: -0.02em;
        }

        @media (min-width: 600px) {
            h1 { font-size: 2.15rem; }
        }

        p.subtitle {
            color: var(--texto-suave);
            margin-bottom: 32px;
            font-size: 0.95rem;
            font-weight: 400;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.82rem;
            color: var(--primario);
            letter-spacing: 0.01em;
        }

        input[type="text"], input[type="email"], input[type="tel"] {
            width: 100%;
            padding: 15px 16px; 
            border: 1.5px solid var(--borde);
            border-radius: 12px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 16px;
            font-weight: 400;
            color: var(--primario);
            background-color: #fafbfc;
            transition: all 0.25s ease;
            -webkit-appearance: none;
        }

        input::placeholder {
            color: #a0aec0;
            font-weight: 400;
        }

        input:focus {
            outline: none;
            border-color: var(--acento);
            background-color: var(--blanco);
            box-shadow: 0 0 0 4px rgba(37, 211, 102, 0.12);
        }

        .radio-section {
            background: #fafbfc;
            padding: 18px 18px 18px 18px;
            border-radius: 14px;
            border: 1.5px solid var(--borde);
            margin-bottom: 22px;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px dashed #e2e8f0;
        }

        .radio-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        @media (min-width: 400px) {
            .radio-group { flex-direction: row; justify-content: space-between; align-items: center; }
        }

        .radio-group > label {
            font-size: 0.88rem;
            margin-bottom: 0;
        }

        .options { display: flex; gap: 10px; flex: 1; max-width: 200px; }

        .options label {
            flex: 1;
            font-weight: 500;
            cursor: pointer;
            padding: 10px 15px;
            border: 1.5px solid var(--borde);
            border-radius: 10px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            position: relative;
            color: var(--texto);
        }

        .options input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .options label:has(input:checked) {
            background-color: var(--acento);
            border-color: var(--acento);
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.25);
        }

        /* Sección Medios de Pago */
        .payment-section {
            background: #fafbfc;
            padding: 18px;
            border-radius: 14px;
            border: 1.5px solid var(--borde);
            margin-bottom: 22px;
            text-align: left;
        }

        .payment-section > label.section-title {
            font-size: 0.88rem;
            margin-bottom: 14px;
            display: block;
        }

        .payment-hint {
            color: var(--texto-suave);
            font-size: 0.78rem;
            font-weight: 400;
            margin-top: -8px;
            margin-bottom: 14px;
            display: block;
        }

        .payment-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        @media (min-width: 480px) {
            .payment-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .payment-option {
            position: relative;
            cursor: pointer;
            margin-bottom: 0;
        }

        .payment-option input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .payment-option .payment-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 10px;
            border: 1.5px solid var(--borde);
            border-radius: 10px;
            background: white;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--texto);
            transition: all 0.2s ease;
            text-align: center;
            min-height: 44px;
            box-sizing: border-box;
        }

        .payment-option input[type="checkbox"]:checked + .payment-label {
            background-color: var(--acento);
            border-color: var(--acento);
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.25);
        }

        .grid-mobile { display: flex; flex-direction: column; gap: 0; }
        @media (min-width: 480px) {
            .grid-mobile { flex-direction: row; gap: 15px; }
            .grid-mobile .form-group { flex: 1; }
        }

        button {
            width: 100%;
            background-color: var(--acento);
            color: white;
            padding: 17px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 6px 16px rgba(37, 211, 102, 0.3);
            letter-spacing: 0.01em;
            margin-top: 6px;
        }

        button:hover {
            background-color: var(--acento-hover);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.38);
            transform: translateY(-1px);
        }

        button:active { 
            transform: scale(0.98) translateY(0); 
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.25);
        }

        button:disabled {
            background-color: #a0aec0;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .success-msg {
            display: none;
            color: #1a7340;
            font-weight: 600;
            margin-top: 20px;
            padding: 16px;
            background: #d4f4e0;
            border-radius: 12px;
            font-size: 0.92rem;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://lh3.googleusercontent.com/d/1SGywAsWA8FAiwUhOd03aEhsBzGrXgotX" alt="Logo" class="logo">
    <h1>Únete a la Comunidad</h1>
    <p class="subtitle">Registra tu local gastronómico de forma profesional</p>

    <form id="gastronomiaForm">
        <div class="form-group">
            <label>Nombre del Local *</label>
            <input type="text" name="nombre_local" placeholder="Ej: La Posta Restó" required>
        </div>

        <div class="radio-section">
            <div class="radio-group">
                <label>¿Comer en local? *</label>
                <div class="options">
                    <label><input type="radio" name="comer_local" value="si" required> Sí</label>
                    <label><input type="radio" name="comer_local" value="no"> No</label>
                </div>
            </div>

            <div class="radio-group">
                <label>¿Comida para llevar? *</label>
                <div class="options">
                    <label><input type="radio" name="take_away" value="si" required> Sí</label>
                    <label><input type="radio" name="take_away" value="no"> No</label>
                </div>
            </div>

            <div class="radio-group">
                <label>¿Delivery propio? *</label>
                <div class="options">
                    <label><input type="radio" name="delivery" value="si" required> Sí</label>
                    <label><input type="radio" name="delivery" value="no"> No</label>
                </div>
            </div>
        </div>

        <div class="payment-section">
            <label class="section-title">Medios de Pago Disponibles *</label>
            <span class="payment-hint">Podés seleccionar más de una opción</span>
            <div class="payment-grid">
                <label class="payment-option">
                    <input type="checkbox" name="medios_pago" value="Mercado Pago">
                    <span class="payment-label">Mercado Pago</span>
                </label>
                <label class="payment-option">
                    <input type="checkbox" name="medios_pago" value="Efectivo">
                    <span class="payment-label">Efectivo</span>
                </label>
                <label class="payment-option">
                    <input type="checkbox" name="medios_pago" value="Transferencia">
                    <span class="payment-label">Transferencia</span>
                </label>
                <label class="payment-option">
                    <input type="checkbox" name="medios_pago" value="Tarjetas">
                    <span class="payment-label">Tarjetas</span>
                </label>
                <label class="payment-option">
                    <input type="checkbox" name="medios_pago" value="QR">
                    <span class="payment-label">QR</span>
                </label>
            </div>
        </div>

        <div class="grid-mobile">
            <div class="form-group">
                <label>Provincia *</label>
                <input type="text" name="provincia" placeholder="Ej: Bs As" required>
            </div>
            <div class="form-group">
                <label>Barrio *</label>
                <input type="text" name="barrio" placeholder="Ej: Palermo" required>
            </div>
        </div>

        <div class="form-group">
            <label>Nombre del Contacto *</label>
            <input type="text" name="nombre_contacto" placeholder="Nombre del dueño" required>
        </div>

        <div class="form-group">
            <label>Cuenta de Gmail *</label>
            <input type="email" name="mail" placeholder="contacto@mail.com" required>
        </div>

        <div class="grid-mobile">
            <div class="form-group">
                <label>Celular Personal *</label>
                <input type="tel" name="celular_personal" placeholder="Ej: 1122334455" required>
            </div>
            <div class="form-group">
                <label>Celular Negocio *</label>
                <input type="tel" name="celular_negocio" placeholder="Para pedidos" required>
            </div>
        </div>

        <button type="submit" id="submitBtn">Registrar y Enviar WhatsApp</button>
        <div id="responseMsg" class="success-msg">¡Datos registrados! Redirigiendo a WhatsApp...</div>
    </form>
</div>
